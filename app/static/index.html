<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Internet Access</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1923;
      --card: #1a2535;
      --border: #2a3a52;
      --on: #22c55e;
      --off: #475569;
      --text: #f1f5f9;
      --subtext: #94a3b8;
      --error: #ef4444;
      --shadow: 0 4px 24px rgba(0,0,0,0.4);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
    }

    header {
      text-align: center;
      margin-bottom: 32px;
    }
    header h1 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    header p {
      color: var(--subtext);
      font-size: 0.875rem;
      margin-top: 4px;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: var(--shadow);
      transition: border-color 0.3s;
    }
    .card.on { border-color: var(--on); }
    .card.loading { opacity: 0.6; pointer-events: none; }

    .card-info { flex: 1; margin-right: 16px; }
    .card-name {
      font-size: 1.1rem;
      font-weight: 600;
    }
    .card-status {
      font-size: 0.8rem;
      margin-top: 4px;
      font-weight: 500;
      transition: color 0.3s;
    }
    .card.on .card-status { color: var(--on); }
    .card:not(.on) .card-status { color: var(--subtext); }

    /* Toggle switch */
    .toggle-wrap {
      position: relative;
      width: 64px;
      height: 36px;
      flex-shrink: 0;
    }
    .toggle-wrap input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }
    .slider {
      position: absolute;
      inset: 0;
      background: var(--off);
      border-radius: 18px;
      cursor: pointer;
      transition: background 0.3s;
    }
    .slider::after {
      content: '';
      position: absolute;
      width: 28px;
      height: 28px;
      left: 4px;
      top: 4px;
      background: #fff;
      border-radius: 50%;
      transition: transform 0.3s;
      box-shadow: 0 2px 6px rgba(0,0,0,0.3);
    }
    input:checked + .slider { background: var(--on); }
    input:checked + .slider::after { transform: translateX(28px); }

    /* Spinner overlay on toggle */
    .spinner {
      display: none;
      position: absolute;
      inset: 0;
      align-items: center;
      justify-content: center;
    }
    .card.loading .spinner { display: flex; }
    .spinner svg { animation: spin 0.7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--error);
      color: #fff;
      padding: 12px 20px;
      border-radius: 12px;
      font-size: 0.875rem;
      font-weight: 500;
      box-shadow: var(--shadow);
      transition: transform 0.3s ease;
      z-index: 100;
      max-width: 340px;
      text-align: center;
    }
    #toast.show { transform: translateX(-50%) translateY(0); }

    /* Init overlay */
    #init-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      z-index: 50;
    }
    #init-overlay p { color: var(--subtext); font-size: 0.9rem; }
    #init-overlay svg { animation: spin 1s linear infinite; }
  </style>
</head>
<body>

<div id="init-overlay">
  <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="#94a3b8" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
  </svg>
  <p>Connecting to Fortigate&hellip;</p>
</div>

<header>
  <h1>Internet Access</h1>
  <p>Toggle parental controls</p>
</header>

<div class="cards" id="cards"></div>

<div id="toast"></div>

<script>
  const cardsEl = document.getElementById('cards');
  const toastEl = document.getElementById('toast');
  const initOverlay = document.getElementById('init-overlay');
  let toastTimer;

  function showToast(msg) {
    clearTimeout(toastTimer);
    toastEl.textContent = msg;
    toastEl.classList.add('show');
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 4000);
  }

  function renderCard(toggle) {
    const existing = document.getElementById(`card-${toggle.id}`);
    const on = toggle.enabled;

    if (existing) {
      existing.classList.toggle('on', on);
      existing.querySelector('.card-status').textContent = on ? 'Internet ON' : 'Internet OFF';
      existing.querySelector('input').checked = on;
      return;
    }

    const card = document.createElement('div');
    card.className = `card${on ? ' on' : ''}`;
    card.id = `card-${toggle.id}`;
    card.innerHTML = `
      <div class="card-info">
        <div class="card-name">${toggle.label}</div>
        <div class="card-status">${on ? 'Internet ON' : 'Internet OFF'}</div>
      </div>
      <div class="toggle-wrap">
        <input type="checkbox" id="toggle-${toggle.id}" ${on ? 'checked' : ''} />
        <label class="slider" for="toggle-${toggle.id}"></label>
        <div class="spinner">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round">
            <path d="M21 12a9 9 0 1 1-6.219-8.56"/>
          </svg>
        </div>
      </div>
    `;

    card.querySelector('input').addEventListener('change', (e) => {
      handleToggle(toggle.id, e.target.checked, card, e.target);
    });

    cardsEl.appendChild(card);
  }

  async function handleToggle(id, enabled, cardEl, inputEl) {
    cardEl.classList.add('loading');
    try {
      const resp = await fetch(`/api/toggle/${id}`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ enabled }),
      });
      if (!resp.ok) {
        const err = await resp.json().catch(() => ({ detail: 'Unknown error' }));
        throw new Error(err.detail || `HTTP ${resp.status}`);
      }
      const data = await resp.json();
      const on = data.enabled;
      cardEl.classList.toggle('on', on);
      cardEl.querySelector('.card-status').textContent = on ? 'Internet ON' : 'Internet OFF';
      inputEl.checked = on;
    } catch (err) {
      // Revert toggle on error
      inputEl.checked = !enabled;
      cardEl.classList.toggle('on', !enabled);
      cardEl.querySelector('.card-status').textContent = !enabled ? 'Internet ON' : 'Internet OFF';
      showToast(`Error: ${err.message}`);
    } finally {
      cardEl.classList.remove('loading');
    }
  }

  async function loadStatus() {
    try {
      const resp = await fetch('/api/status');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const data = await resp.json();
      data.toggles.forEach(renderCard);
      initOverlay.style.display = 'none';
    } catch (err) {
      initOverlay.querySelector('p').textContent = `Failed to connect: ${err.message}`;
      showToast(`Connection error: ${err.message}`);
    }
  }

  loadStatus();
</script>
</body>
</html>
